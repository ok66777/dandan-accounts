<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💰 蛋蛋账本</title>
<style>
  :root {
    --bg: #0f0c29; --card: #1a1a3e; --card2: #252550;
    --income: #4ade80; --expense: #f87171; --gold: #fbbf24;
    --accent: #818cf8; --text: #e2e8f0; --muted: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }
  .header {
    background: linear-gradient(135deg, #1e1e4e, #2d1b69);
    padding: 18px 16px 14px;
  }
  .header-title { font-size: 1.4em; font-weight: bold; color: #fff; text-align: center; }
  .header-sub { font-size: 0.8em; color: var(--muted); text-align: center; margin-top: 4px; }
  .balance-row {
    display: flex; justify-content: space-around; margin-top: 14px;
    background: var(--card); border-radius: 16px; padding: 16px;
  }
  .bal-item { text-align: center; }
  .bal-label { font-size: 0.72em; color: var(--muted); margin-bottom: 4px; }
  .bal-val { font-size: 1.1em; font-weight: bold; }
  .bal-val.pos { color: var(--income); }
  .bal-val.neg { color: var(--expense); }
  .page { display: none; padding: 0 16px 100px; }
  .page.active { display: block; }
  .section-title {
    font-size: 0.85em; color: var(--muted); margin: 18px 0 10px;
    padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .input-card {
    background: var(--card); border-radius: 16px; padding: 20px;
    margin-bottom: 16px;
  }
  .input-row { margin-bottom: 12px; }
  .input-label { font-size: 0.78em; color: var(--muted); margin-bottom: 6px; display: block; }
  .input-field {
    width: 100%; padding: 14px 16px; border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px; background: var(--card2); color: #fff; font-size: 1.1em;
    font-family: inherit; outline: none; transition: border 0.2s;
  }
  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--muted); }
  .amount-row { display: flex; gap: 10px; align-items: center; }
  .amount-field { flex: 1; }
  .type-chip-row { display: flex; gap: 8px; }
  .type-chip {
    flex: 1; padding: 12px; text-align: center; border-radius: 12px;
    border: 1.5px solid rgba(255,255,255,0.1); background: var(--card2);
    cursor: pointer; font-size: 0.95em; font-family: inherit;
    color: var(--muted); transition: all 0.2s;
  }
  .type-chip.active.pos { border-color: var(--income); background: rgba(74,222,128,0.15); color: var(--income); }
  .type-chip.active.neg { border-color: var(--expense); background: rgba(248,113,113,0.15); color: var(--expense); }
  .submit-btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    font-size: 1.1em; font-family: inherit; font-weight: bold; cursor: pointer;
    background: var(--accent); color: #fff; margin-top: 4px; transition: opacity 0.2s;
  }
  .person-card {
    background: var(--card); border-radius: 16px; padding: 16px;
    margin-bottom: 10px;
  }
  .person-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .person-name { font-size: 1.1em; font-weight: bold; }
  .person-balance { font-size: 1.1em; font-weight: bold; }
  .person-balance.pos { color: var(--income); }
  .person-balance.neg { color: var(--expense); }
  .person-balance.zero { color: var(--muted); }
  .person-del { background: rgba(248,113,113,0.2); border: none; border-radius: 8px; color: var(--expense); font-size: 0.85em; padding: 6px 10px; cursor: pointer; }
  .person-records { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 8px; }
  .person-record {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; font-size: 0.88em;
  }
  .person-record-note { color: var(--muted); }
  .person-record-amount { font-weight: 500; }
  .person-record-amount.pos { color: var(--income); }
  .person-record-amount.neg { color: var(--expense); }
  .person-record-del { background: none; border: none; color: var(--muted); font-size: 0.8em; cursor: pointer; margin-left: 8px; }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-icon { font-size: 3em; margin-bottom: 10px; }
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15,12,41,0.95); backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 50;
  }
  .nav-item { flex: 1; text-align: center; border: none; background: transparent; color: var(--muted); font-size: 0.72em; font-family: inherit; cursor: pointer; padding: 6px; }
  .nav-item .nav-icon { font-size: 1.5em; display: block; margin-bottom: 3px; }
  .nav-item.active { color: var(--accent); }
  .export-row { display: flex; gap: 10px; margin-top: 16px; }
  .export-btn {
    flex: 1; padding: 14px; border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 12px; background: transparent; color: var(--accent);
    font-size: 0.95em; font-family: inherit; cursor: pointer;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
</style>
</head>
